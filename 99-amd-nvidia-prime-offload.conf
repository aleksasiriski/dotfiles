Section "ServerLayout"
	Identifier "layout"
	Option "AllowNVIDIAGPUScreens"
EndSection

Section "OutputClass"
	Identifier "iGPU"
	MatchDriver "amdgpu"
	Driver "modesetting"
EndSection

Section "Device"
	Identifier "nvidia"
	Driver "nvidia"
EndSection

Section "OutputClass"
	Identifier "nvidia"
	MatchDriver "nvidia-drm"
	Driver "nvidia"
	Option "AllowEmptyInitialConfiguration"
	ModulePath "/usr/lib/nvidia/xorg"
	ModulePath "/usr/lib/xorg/modules"
EndSection
